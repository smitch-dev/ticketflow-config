server:
  port: 8082

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:postgresql://postgres:5432/ticketflow_db
    username: postgres
    password: jjk

  kafka:
    bootstrap-servers: kafka:9092

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8180/realms/ticketflow
          jwk-set-uri: http://keycloak:8180/realms/ticketflow/protocol/openid-connect/certs

resilience4j:
  circuitbreaker:
    instances:
      userServiceCB:
        recordExceptions:
          - feign.FeignException

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://zipkin:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, tracing
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true